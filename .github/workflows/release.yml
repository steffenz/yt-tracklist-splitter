name: release

# Build native installers on GitHub's runners and attach them to a draft Release.
# Trigger by pushing a tag like `v0.1.0`, or run manually from the Actions tab.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest   # Apple Silicon  -> .dmg / .app (aarch64)
          - os: macos-13       # Intel          -> .dmg / .app (x86_64)
          - os: ubuntu-22.04   # Linux          -> .AppImage / .deb
          - os: windows-latest # Windows        -> .msi / .exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install deps and fetch sidecars
        run: |
          npm ci
          npm run fetch-binaries

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tagName: split-set-v__VERSION__
          releaseName: "split-set v__VERSION__"
          releaseDraft: true
          prerelease: false
